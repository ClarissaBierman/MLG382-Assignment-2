services:
  - type: web
    name: stockoracle
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:server --workers 1 --timeout 300 --bind 0.0.0.0:$PORT --preload"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
 